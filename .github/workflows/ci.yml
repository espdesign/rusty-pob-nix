name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nix-community/nix-install-action@v5
      - uses: actions/cache@v4
        with:
          path: /nix
          key: ${{ runner.os }}-nix-${{ hashFiles('**/flake.lock') }}

      - run: nix flake check
